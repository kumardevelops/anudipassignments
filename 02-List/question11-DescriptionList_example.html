<!-- Create a definition list explaining three HTML tags:
<p>, <br />, and <a>. -->

<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Description List Example</title>
	</head>
	<body>
		<dl>
			<dt>p tag</dt>
			<dd>P tag is paragraph tag which is used to write paragraphs in html.</dd>
			<dt>br tag</dt>
			<dd>
				br tag is line break tag which is used to create new line in html.
			</dd>
			<dt>a tag</dt>
			<dd>
				P tag is link tag which is used to create link/line two html pages html.
			</dd>
		</dl>
	</body>
</html>
